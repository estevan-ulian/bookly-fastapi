services:
  db:
    image: 'postgres:14.17-alpine'
    container_name: bookly-db
    environment:
      POSTGRES_USER: bookly_user
      POSTGRES_PASSWORD: bookly_password
      POSTGRES_DB: bookly_db
    ports:
      - '9991:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
  adminer:
    container_name: 'bookly-adminer'
    image: adminer
    ports: 
      - '9992:8080'
  redis:
    image: redis:latest
    container_name: bookly-redis
    environment:
      - name=value
    ports:
      - '9993:6379'
    volumes:
      - redis-data:/data
volumes:
  redis-data:
  db-data: